// SwiftGibs - competitive instagib config
// NOTE: no scr_w/scr_h/fullscreen here on purpose - use native resolution.
//       Optional 1440p settings live in display-mine.cfg (exec it if you want them).
//
// STRUCTURE: this file runs on EVERY launch, *after* config.cfg (the player's saved
// settings). So it must never re-set persisted preferences unconditionally - that
// overwrites whatever the player chose, every single launch (v1.1 shipped a pinned
// player name this way: bug). Instead:
//   - the FIRST-RUN DEFAULTS block applies the SwiftGibs competitive config exactly
//     once, guarded by a persisted marker alias; after that the player owns every one
//     of those settings and their choices persist normally, and
//   - everything below the block is per-launch infrastructure (sound registration,
//     menu wiring, safety guards) that is not a saved preference.

// === FIRST-RUN DEFAULTS (applied once; the marker alias persists via config.cfg) ===
if (strcmp $swiftgibs_setup "") [

  // crosshair
  crosshairsize 15
  crosshairfx 1
  loadcrosshair data/crosshair.png 0
  loadcrosshair data/hit.png 2

  // visibility
  fullbrightmodels 90    // bright flat player colours without washing them white (200 saturates the flat skins)
  forceplayermodels 1

  // camera / view
  fov 120
  maxroll 0
  hudgun 0
  hudgunsway 0
  muzzleflash 0
  muzzlelight 0
  zoominvel 0
  zoomoutvel 0

  // audio
  musicvol 0        // no music by default (sound effects + reload metronome stay on)

  // performance
  maxfps 495
  blood 0
  grass 0
  shaderdetail 0
  vsync 0
  // (blocky/pixelated lighting is OPT-IN via the SwiftGibs tab checkbox - it flips
  //  the stock `bilinear` filter off; smooth is the default for everyone)

  // corpses
  hidedead 1
  ragdoll 0
  ragdollmillis 0
  ragdollfade 0

  // feedback
  teamcrosshair 1
  hitsound 1
  hitcrosshair 1000

  // scoreboard (frags + deaths in EVERY mode incl. CTF)
  hidefrags 0
  showdeaths 1
  showkdr 1
  showacc 0
  showdmg 0
  showcaptures 1

  // server browser
  filterinstaservers 1

  // input / identity (NO name here: the player picks their own, once, and it sticks)
  sensitivity 2.4
  mouseaccel 0
  invmouse 0
  playermodel 1
  gamma 110

  // binds
  bind MOUSE1 attack
  bind MOUSE2 togglezoom

  // friends cosmetics
  friendmarker ""

  swiftgibs_setup = 1   // persisted via config.cfg -> this block never runs again
]

// === per-launch infrastructure below this line (not saved preferences) ===

// Low-res world is baked into the shipped texture files (crushed to 2px by the
// stripper). Runtime texreduce/maxtexsize MUST stay 0: they are global and would
// also crush the font/HUD atlases -> mangled text. Re-pinned every launch on
// purpose, as a guard rail (any other value breaks text rendering in this build).
texreduce 0
maxtexsize 0

// hit-sound alternates (index N selected by hitsoundsel; 0 = stock free/hit, the VARP default).
// These registersounds just preload the samples; the actual play volume comes from hitsoundvol.
registersound "swiftgibs/hit_tf2"     100
registersound "swiftgibs/hit_quake"   100
registersound "swiftgibs/hit_cod"     100
registersound "swiftgibs/hit_custom1" 100
registersound "swiftgibs/hit_custom2" 100

// killstreak milestone ding (5/10/15/20 kill streaks); off by default (VARP default 0).
registersound "swiftgibs/streak" 128

// === SwiftGibs feedback (F8 in-game, or Esc -> options -> SwiftGibs) ===
// Version stamp attached to feedback reports. BUMP THIS with every release tag.
swiftgibsversion = "1.1.7"
// F8 snaps a screenshot of the moment and opens the feedback page over the
// game. Bound per-launch but ONLY if F8 is currently free, so a player's own
// rebind always wins (getbind returns "" for an unbound key; strcmp = 1 when
// equal).
feedbackshot = [ screenshot feedbackshot.jpg ; sgFbShot = 1 ; showgui feedback ]
if (strcmp (getbind F8) "") [ bind F8 [feedbackshot] ] []

// === SwiftGibs clean screenshots (F12) ===
// cleanshots persists (guarded init, default 1 = hide the HUD before saving). The
// hidden-HUD frame must actually RENDER before `screenshot` grabs the composited
// frame - hence the sleep; do not screenshot in the SAME sleep block as the hidehud
// toggle or it captures the pre-hide frame. F12 is claimed per-launch (like F8 above)
// but ONLY if the current bind is still the stock default ("screenshot", per stock
// data/defaults.cfg) or unbound - a player's own F12 rebind always wins.
if (strcmp (getalias cleanshots) "") [ cleanshots = 1 ] []
// NOTE: conoutf is a C++-only console print, not script-callable here (verified in the
// mirror harness: "unknown command: conoutf") - echo is this codebase's actual
// script-level console print (used throughout overlay/*.cfg), so use that instead.
swiftshot = [ if $cleanshots [ hidehud 1 ; sleep 60 [ screenshot ; hidehud 0 ; echo "screenshot saved" ] ] [ screenshot ; echo "screenshot saved" ] ]
if (|| (strcmp (getbind F12) "") (strcmp (getbind F12) "screenshot")) [ bind F12 [swiftshot] ] []

// === SwiftGibs deep zoom (a thumb button for a tighter zoom than right-click) ===
// The physical side/thumb buttons are MOUSE6 and MOUSE7 (keycodes -6/-7 = SDL X1/X2).
// MOUSE4/MOUSE5 are the SCROLL WHEEL (keycodes -4/-5) and already drive weapon switch,
// so deep zoom must NOT use them. deepzoomfov persists in config.cfg; init ONLY if
// undefined (never unconditionally - that would stomp the player's tuning every launch).
// Binds claimed per-launch but ONLY if the button is free (user rebinds win).
// deepzoomoff restores the player's own zoomfov captured at press time. deepzoomed
// tracks whether deep zoom is CURRENTLY active (set by deepzoomon/off themselves, so
// it stays correct no matter which path triggered it) - togglezoom (below) reads it
// to unwind deep zoom cleanly instead of leaving zoomfov stuck. deepzoomon only
// captures dzprev when NOT already deep-zoomed, so re-entering deep zoom while it's
// already active (e.g. both MOUSE6 and MOUSE7 pressed together in hold mode) can't
// clobber dzprev with the deep-zoom fov itself - that would wedge zoomfov at the
// deep value once every button is released. The toggle-mode path only ever calls
// deepzoomon while deepzoomed is 0 already, so the guard is a no-op there.
if (strcmp (getalias deepzoomfov) "") [ deepzoomfov = 16 ] []
deepzoomed = 0
deepzoomon = [ if (! $deepzoomed) [ dzprev = $zoomfov ] [] ; zoomfov $deepzoomfov ; zoom 1 ; deepzoomed = 1 ]
deepzoomoff = [ zoom -1 ; zoomfov $dzprev ; deepzoomed = 0 ]
// deepzoom obeys zoomholdmode (defined below) for parity with the regular zoom button:
// hold-to-zoom (1) holds while the button is pressed; click-to-toggle (0) flips
// deepzoomed on/off per press, same shape as togglezoom.
deepzoom = [ if $zoomholdmode [ deepzoomon ; onrelease [ deepzoomoff ] ] [ if $deepzoomed [ deepzoomoff ] [ deepzoomon ] ] ]
// Also re-claim MOUSE6/MOUSE7 when the current bind body is the OLD inline deep-zoom body
// (pre-8eebfa5: `bind MOUSE6 [ deepzoomon ; onrelease [ deepzoomoff ] ]`) - a returning
// player's config.cfg holds that old body verbatim, so the free-only check above would
// skip them forever and deep zoom would stay hold-only for them. Mirrors the F12/swiftshot
// re-claim pattern above. Exact body string verified in the mirror harness against getbind's
// actual output (leading/trailing whitespace inside the outer brackets is significant -
// getbind strips it, so the comparison literal must NOT have it).
if (|| (strcmp (getbind MOUSE6) "") (strcmp (getbind MOUSE6) [deepzoomon ; onrelease [ deepzoomoff ]])) [ bind MOUSE6 [ deepzoom ] ] []
if (|| (strcmp (getbind MOUSE7) "") (strcmp (getbind MOUSE7) [deepzoomon ; onrelease [ deepzoomoff ]])) [ bind MOUSE7 [ deepzoom ] ] []

// === SwiftGibs expanded map (whole stage + blips), toggle on M if free ===
if (strcmp (getbind M) "") [ bind M [ toggleexpandedmap ] ] []

// === SwiftGibs map-vote panel (auto-opens when a server vote starts; V opens it any time) ===
exec menus_mapvote.cfg
votepanel = [ showgui "mapvote" ]
// Also re-claim V when the current bind body is the OLD inline body (pre-named-action:
// `bind V [ showgui "mapvote" ]`) - a returning player's config.cfg holds that verbatim.
if (|| (strcmp (getbind V) "") (strcmp (getbind V) [showgui "mapvote"])) [ bind V [ votepanel ] ] []

// === SwiftGibs zoom behaviour: click-to-toggle (stock) or hold-to-zoom ===
// zoomholdmode persists in config.cfg (guarded init, never stomped). togglezoom is
// redefined per launch AFTER the stock data/game_fps.cfg definition, so the same
// binds (MOUSE2, G, Z) obey whichever mode the player picked. deepzoom (above) obeys
// the same mode. onrelease inside the alias fires when the pressed key is let go.
// If deep zoom is currently active, togglezoom exits IT cleanly (deepzoomoff restores
// the player's own zoomfov) instead of a plain zoom -1, which would leave zoomfov
// stuck at the deep zoom value.
if (strcmp (getalias zoomholdmode) "") [ zoomholdmode = 0 ] []
togglezoom = [ if $deepzoomed [ deepzoomoff ] [ if $zoomholdmode [ zoom 1 ; onrelease [ zoom -1 ] ] [ zoom (if (= $zoom 1) -1 1) ] ] ]

// === SwiftGibs update check ===
// Asks the relay for the latest release tag (silent, ~50ms when the box is up,
// hard-capped if not). Sets swiftgibsupdate/swiftgibslatest; the main menu
// (menus_main.cfg) shows a banner when a newer release exists, and
// update-swiftgibs.bat in the game folder performs the actual update.
swiftgibsupdate = 0
swiftgibslatest = ""
checkupdate $swiftgibsversion

// === SwiftGibs preferences profiles (Task 3) ===
// Canonical list of every setting a named profile captures - space-separated ident
// names, each either a VARP/FVARP (stock or SwiftGibs) or a plain CubeScript alias.
// saveprofile (patches/16-profiles.patch) looks each one up via idents and writes
// the correct syntax per type (`name value` for vars, `name = [value]` for aliases),
// mirroring the engine's own writecfg(). Loading is just `exec profiles/<name>.cfg`
// (no C++ needed); listing/removing use the stock loopfiles ICOMMAND and delprofile.
// Deliberately EXCLUDED: name, friends, stats, binds (those aren't "a settings
// profile" - swapping your name or key bindings on load would be surprising) and
// expandedmap (a momentary view toggle, explicitly not persisted even to config.cfg).
sgProfileVars = [
  reloadcount reloadflash reloadmetronome reloadmetrovol
  reloadcounthue reloadcountalpha reloadflashhue reloadflashalpha reloadcountmono reloadflashmono
  hitmarker hitsoundsel hitsoundvol hitsoundpitch
  firesound firesoundvol firesoundpitch reloadsound reloadsoundvol reloadsoundpitch gunreloadsound
  killstreakfx killstreaksound killstreakhud
  showkdr showacc showdmg showcaptures hidefrags showdeaths showstreakcol
  highlightfriends highlightself enemyfriendhl friendmodels friendblip
  teamcrosshair teamcrosshairstyle teamcrosshaircolor
  flagcarrypopup mapvotepopup zoomholdmode deepzoomfov filterinstaservers
  bilinear fullbrightmodels crosshairsize sensitivity fov musicvol
  cleanshots
]

// === SwiftGibs menus ===
exec menus_settings.cfg   // SwiftGibs + Friends tabs (attached to Esc->options by the bundler)
exec menus_main.cfg       // stock main menu + update-available banner (overrides data/menus.cfg)
exec menus_insta.cfg      // F3 Quick Play
exec menus_stats.cfg      // Career stats page + guarded reset
exec menus_chat.cfg       // Chat history page
exec menus_profiles.cfg   // Preferences profiles page (Task 3)
// Reproduces the (small, self-contained) stock server-browser gui verbatim with one added
// checkbox for filterinstaservers; runs after data/menus.cfg (see main.cpp exec order) so this
// definition wins. The same toggle also stays available in the SwiftGibs settings tab above.
exec menus_serverbrowser.cfg

// === SwiftGibs named actions in the stock keys gui ===
// The stock options>keys tab lists every bindable action from $bindactions (lowercase -
// this is the shipped 2020 client's actual identifier; the modern sauerbraten mirror
// renamed it BindActions/OPT_TAB_Input, but that refactor isn't in her install - verified
// against the staged dist/SwiftGibs-linux-x86_64/data/menus.cfg). Runs after data/menus.cfg
// has already defined it (main.cpp execfile order), so appending here is safe. Entries are
// single words (no args, unlike "setweapon FI"). quickplay is defined by menus_insta.cfg
// (exec'd above); the rest are defined earlier in this file. toggleexpandedmap and
// feedbackshot were already bindable actions before this task - only their names are new
// to the keys list here.
// GOTCHA (found in the mirror harness): $bindactions is a plain alias, and plain aliases
// DO round-trip through config.cfg here (confirmed: a fresh-harness config.cfg written
// after launch contained a `bindactions = [...]` line) - so an UNGUARDED concat would
// re-append these 6 names every single launch, growing forever. Guard on whether the
// marker action is already present.
if (= (strstr $bindactions "swiftshot") -1) [
  bindactions = (concat $bindactions "toggleexpandedmap votepanel feedbackshot quickplay deepzoom swiftshot")
] []

// === SwiftGibs M3 friends ===
exec friends.cfg 0   // load saved friends; 0 = suppress missing-file error on first run

// Reload countdown/flash/metronome + teammate crosshair defaults are built-in VARP values
// (countdown/flash/metronome off, teammate crosshair=blue tint); NOT set here so the
// settings tabs persist the player's own choices.

// === SwiftGibs flat player models ===
// Players render as flat solid team colours (teammate blue, friend cyan, enemy red, friend-enemy orange).
// No cvar/keybind needed - it's the only render style.

// === SwiftGibs career stats (persisted to stats.cfg) ===
// getfrags/getdeaths/gettotaldamage/gettotalshots reset to 0 by the engine at the start of
// every match (fpsgame/fps.cpp startgame()), so summing them at each intermission gives a
// clean per-match delta with no double-counting. getbeststreak is a running session-lifetime
// max that never resets, so comparing it against the persisted value and keeping the greater
// is also safe to repeat every intermission.
// Accuracy is not stored directly - it is derived later from st_damage/st_shots.
// The alias inits are safe fallbacks exec'd BEFORE stats.cfg restores the persisted totals.
alias st_matches 0
alias st_frags 0
alias st_deaths 0
alias st_damage 0
alias st_shots 0
alias st_beststreak 0
alias st_topstreaks ""   // flat list of "streak map date" triples, sorted desc, max 5

// Insert one "streak map date" triple into st_topstreaks, keeping it sorted
// descending by streak and truncated to the top 5 (15 tokens). The list is kept
// sorted as an invariant, so we insert before the first lower entry.
addstreakentry = [
  ns = $arg1 ; nm = $arg2 ; nd = $arg3
  newlist = "" ; inserted = 0
  loop i (div (listlen $st_topstreaks) 3) [
    es = (at $st_topstreaks (* $i 3))
    if (&& (! $inserted) (> $ns $es)) [ newlist = (concat $newlist $ns $nm $nd) ; inserted = 1 ]
    newlist = (concat $newlist (at $st_topstreaks (* $i 3)) (at $st_topstreaks (+ (* $i 3) 1)) (at $st_topstreaks (+ (* $i 3) 2)))
  ]
  if (! $inserted) [ newlist = (concat $newlist $ns $nm $nd) ]
  alias st_topstreaks (sublist $newlist 0 15)
]
writestats = [ writestatsfile $st_matches $st_frags $st_deaths $st_damage $st_shots $st_beststreak $st_topstreaks ]
intermission = [
  alias st_matches (+ $st_matches 1)
  alias st_frags   (+ $st_frags (getfrags))
  alias st_deaths  (+ $st_deaths (getdeaths))
  alias st_damage  (+ $st_damage (gettotaldamage))
  alias st_shots   (+ $st_shots (gettotalshots))
  if (> (getbeststreak) $st_beststreak) [ alias st_beststreak (getbeststreak) ]
  if (> (getmatchbeststreak) 0) [ addstreakentry (getmatchbeststreak) (getclientmap) (getdatestr) ]
  writestats
  if (&& $mapvotepopup (numvotemaps)) [ showgui "mapvote" ] []
]
exec stats.cfg 0   // load persisted totals if present; 0 = suppress missing-file error on first run
