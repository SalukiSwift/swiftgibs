// SwiftGibs - competitive instagib config
// NOTE: no scr_w/scr_h/fullscreen here on purpose - use native resolution.
//       Optional 1440p settings live in display-mine.cfg (exec it if you want them).

// === crosshair ===
crosshairsize 15
crosshairfx 1
loadcrosshair data/crosshair.png 0
loadcrosshair data/hit.png 2

// === visibility ===
fullbrightmodels 90    // bright flat player colours without washing them white (200 saturated the flat skins)
forceplayermodels 1
// Low-res world is baked into the shipped texture files (crushed to 2px by the
// stripper). Runtime texreduce/maxtexsize MUST stay 0 here: they are global and
// would also crush the font/HUD atlases -> mangled text. Leave at 0.
texreduce 0
maxtexsize 0

// === camera / view ===
fov 120
maxroll 0
hudgun 0
hudgunsway 0
muzzleflash 0
muzzlelight 0
zoominvel 0
zoomoutvel 0

// === audio ===
musicvol 0        // no music by default (sound effects + reload metronome stay on)

// === performance ===
maxfps 495
blood 0
grass 0
shaderdetail 0
vsync 0

// === corpses ===
hidedead 1
ragdoll 0
ragdollmillis 0
ragdollfade 0

// === feedback ===
teamcrosshair 1
hitsound 1
hitcrosshair 1000

// hit-sound alternates (index N selected by hitsoundsel; 0 = stock S_HIT)
registersound "swiftgibs/hit_tf2"     100
registersound "swiftgibs/hit_quake"   100
registersound "swiftgibs/hit_unreal"  100
registersound "swiftgibs/hit_cod"     100
registersound "swiftgibs/hit_custom1" 100
registersound "swiftgibs/hit_custom2" 100
hitsoundsel 0

// killstreak milestone ding (5/10/15/20 kill streaks); off by default
registersound "swiftgibs/streak" 128
killstreaksound 0

// === scoreboard (M1: stock cvars — frags + deaths in EVERY mode incl. CTF) ===
hidefrags 0     // show the frags column even in CTF/collect/capture
showdeaths 1    // show the deaths column

// === SwiftGibs M2 engine features ===
filterinstaservers 1   // server browser shows only instagib-family servers
showkdr 1              // scoreboard KDR column (all players)
showacc 0             // accuracy % — opt-in (reliable for your own row)
showdmg 0             // total damage — opt-in
showcaptures 1        // flag-capture count, shown in CTF modes (all players)

// === input / identity ===
sensitivity 2.4
mouseaccel 0
invmouse 0
playermodel 1
name "Swift"
gamma 110

// === binds ===
bind MOUSE1 attack
bind MOUSE2 togglezoom

// === SwiftGibs menus ===
exec menus_settings.cfg   // SwiftGibs + Friends tabs (attached to Esc->options by the bundler)
exec menus_insta.cfg      // F3 Quick Play
exec menus_stats.cfg      // Career stats page + guarded reset
exec menus_chat.cfg       // Chat history page
// Reproduces the (small, self-contained) stock server-browser gui verbatim with one added
// checkbox for filterinstaservers; runs after data/menus.cfg (see main.cpp exec order) so this
// definition wins. The same toggle also stays available in the SwiftGibs settings tab above.
exec menus_serverbrowser.cfg

// === SwiftGibs M3 friends ===
// highlightfriends/highlightself are VARP-default 1; friend blip on; no overhead name marker.
friendmarker ""
exec friends.cfg 0   // load saved friends; 0 = suppress missing-file error on first run

// Reload countdown/flash/metronome + teammate crosshair defaults are built-in VARP values
// (countdown=Crosshair-Pulse, flash=Ring-ping, metronome off, teammate crosshair=blue tint);
// NOT pinned here so the settings tabs persist the player's own choices.

// === SwiftGibs flat player models ===
// Players render as flat solid team colours (teammate blue, friend cyan, enemy red, friend-enemy orange).
// No cvar/keybind needed — it's the only render style.

// === SwiftGibs career stats (persisted to stats.cfg) ===
// getfrags/getdeaths/gettotaldamage/gettotalshots reset to 0 by the engine at the start of
// every match (fpsgame/fps.cpp startgame()), so summing them at each intermission gives a
// clean per-match delta with no double-counting. getbeststreak (Task 4) is a running
// session-lifetime max that never resets, so comparing it against the persisted value and
// keeping the greater is also safe to repeat every intermission.
// Accuracy is not stored directly — it is derived later from st_damage/st_shots.
// No "time played" field: there's no clean per-match duration accessor, and a wrong number
// is worse than none.
alias st_matches 0
alias st_frags 0
alias st_deaths 0
alias st_damage 0
alias st_shots 0
alias st_beststreak 0
writestats = [ writestatsfile $st_matches $st_frags $st_deaths $st_damage $st_shots $st_beststreak ]
intermission = [
  alias st_matches (+ $st_matches 1)
  alias st_frags   (+ $st_frags (getfrags))
  alias st_deaths  (+ $st_deaths (getdeaths))
  alias st_damage  (+ $st_damage (gettotaldamage))
  alias st_shots   (+ $st_shots (gettotalshots))
  if (> (getbeststreak) $st_beststreak) [ alias st_beststreak (getbeststreak) ]
  writestats
]
exec stats.cfg 0   // load persisted totals if present; 0 = suppress missing-file error on first run
