// SwiftGibs — competitive instagib config (Swift)
// NOTE: no scr_w/scr_h/fullscreen here on purpose — use native resolution.
//       Swift's 1440p settings live in display-mine.cfg (exec it if you want them).

// === crosshair ===
crosshairsize 15
crosshairfx 1
loadcrosshair data/crosshair.png 0
loadcrosshair data/hit.png 2

// === visibility ===
fullbrightmodels 200
forceplayermodels 1
// Low-res world is baked into the shipped texture files (crushed to 2px by the
// stripper). Runtime texreduce/maxtexsize MUST stay 0 here: they are global and
// would also crush the font/HUD atlases -> mangled text. Leave at 0.
texreduce 0
maxtexsize 0

// === camera / view ===
fov 120
maxroll 0
hudgun 0
hudgunsway 0
muzzleflash 0
muzzlelight 0
zoominvel 0
zoomoutvel 0

// === audio ===
musicvol 0        // no music by default (sound effects + reload metronome stay on)

// === performance ===
maxfps 495
blood 0
grass 0
shaderdetail 0
vsync 0

// === corpses ===
hidedead 1
ragdoll 0
ragdollmillis 0
ragdollfade 0

// === feedback ===
teamcrosshair 1
hitsound 1
hitcrosshair 1000

// === scoreboard (M1: stock cvars — frags + deaths in EVERY mode incl. CTF) ===
hidefrags 0     // show the frags column even in CTF/collect/capture
showdeaths 1    // show the deaths column

// === SwiftGibs M2 engine features ===
filterinstaservers 1   // server browser shows only instagib-family servers
showkdr 1              // scoreboard KDR column (all players)
showacc 0             // accuracy % — opt-in (reliable for your own row)
showdmg 0             // total damage — opt-in
showcaptures 1        // flag-capture count, shown in CTF modes (all players)

// === input / identity ===
sensitivity 2.4
mouseaccel 0
invmouse 0
playermodel 1
name "Swift"
gamma 110

// === binds ===
bind MOUSE1 attack
bind MOUSE2 togglezoom

// === SwiftGibs quick-menu + insta default ===
exec menus_insta.cfg
exec menus_scoreboard.cfg
exec menus_hud.cfg

// === SwiftGibs M3 friends ===
highlightfriends 1
highlightself 1
// friend visuals: cyan minimap blip for friend teammates; friend status also drives the player
// render-style colours (friend teammate = cyan, friend enemy = orange). No overhead name marker.
friendblip 1
friendmarker ""
exec friends.cfg 0   // load saved friends; 0 = suppress missing-file error on first run
exec menus_friends.cfg

// === SwiftGibs map-vote panel ===
exec menus_mapvote.cfg
bind V [ showgui "mapvote" ]   // V = open the intermission map-vote panel any time (free in play mode)
// mapvotepopup (auto-open at intermission) is a VARP, default 1 — toggle via the panel checkbox; NOT pinned here.

// === SwiftGibs player render style ===
exec menus_player.cfg
bind P [ playerstyle (! $playerstyle) ]   // P toggles flat colour model <-> hitbox octagon
// playerstyle is a VARP (default 0 = flat model) — set via P / the F3 menu; NOT pinned here so it persists.
