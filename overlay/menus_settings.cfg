// SwiftGibs — settings tab bodies. Attached to Esc->options as tabs by build/integrate-menus.sh
// (which adds `guitab "SwiftGibs"; sgSwiftgibsTab` and `guitab "Friends"; sgFriendsTab` to the
// stock options gui). Colour codes: ^f0 green, ^f3 red, ^f4 grey.
//
// LAYOUT RULE: a tab auto-paginates into an ugly NUMBERED tab when its content exceeds
// ~16 text rows (engine `guiautotab`, 3dgui.cpp). So tabs stay small HUBS; anything bulky
// or dynamic lives on a dedicated sub-page (showgui), where extra height is fine.
// Interactive bodies are wrapped in `guistayopen [ ... ]` so controls adjust in place; "back"
// buttons use `cleargui 1` (pop one level - bare cleargui exits the whole menu stack).
//
// LIVE DEMOS: every cue control carries an onchange action so picking an option previews it
// immediately - `reloadcountdemo` runs a real 3-2-1 with the current countdown style, ready
// flash AND metronome on the HUD (drawn even over the main menu: gl_drawmainmenu calls
// gl_drawhud -> gameplayhud); `playhitsoundpreview` / `playstreaksound` audition the sounds.

sgFriendName = ""
sgFbCat = 0
sgFbText = ""
sgFbShot = 0
sgFbName = 0
feedbackstatus = ""

// ============ SwiftGibs tab: general + HUD (14 rows) ============
// Menu philosophy after the 2026-07-20 revamp: SwiftGibs = general/HUD settings,
// Cues = everything you SEE (timing cues, markers, streak fx), Audio = everything
// you HEAR, Friends = social. Anything slider-heavy lives on a sub-page.
sgSwiftgibsTab = [ guistayopen [
    guicheckbox "server browser: instagib servers only"  filterinstaservers
    guibar
    guitext "Scoreboard"
    guilist [ guicheckbox "frags (all modes)" hidefrags 0 1 ; guistrut 1 ; guicheckbox "deaths" showdeaths ; guistrut 1 ; guicheckbox "KDR" showkdr ]
    guilist [ guicheckbox "captures" showcaptures ; guistrut 1 ; guicheckbox "accuracy" showacc ; guistrut 1 ; guicheckbox "damage" showdmg ; guistrut 1 ; guicheckbox "best streak" showstreakcol ]
    guilist [ guicheckbox "highlight friends" highlightfriends ; guistrut 1 ; guicheckbox "highlight my name" highlightself ; guistrut 1 ; guicheckbox "incl. enemy friends" enemyfriendhl ]
    guibar
    guilist [ guitext "Teammate crosshair: " ; guiradio "Off" teamcrosshair 0 ; guibutton "Colour" [teamcrosshair 1; teamcrosshairstyle 1] ; guibutton "Icon" [teamcrosshair 1; teamcrosshairstyle 0] ]
    guicheckbox "blocky / pixelated lighting (applies on next map load)" bilinear 0 1 [ echo "^f2blocky lighting: change applies when the next map loads" ]
    guicheckbox "flag-carry popup (YOU HAVE THE FLAG)" flagcarrypopup
    guitext "deep zoom magnification (hold Mouse6/7; lower = closer)"
    guislider deepzoomfov 8 30
    guibutton "sens translator (from other games).." [ showgui senstranslator ]
    guibar
    guilist [ guibutton "career stats.." [ showgui swiftstats ] ; guistrut 2 ; guibutton "chat history.." [ showgui swiftchat ] ; guistrut 2 ; guibutton "send feedback.." [ sgFbShot = 0 ; showgui feedback ] ]
] ]

// ---- sensitivity translator: convert a sens from another game via cm/360 maths.
// Sauer: degrees per count = sensitivity / (33 * sensitivityscale)  (rendergl.cpp mousemove)
// Other games: degrees per count = sens * yaw. Equal feel <=> equal degrees per count.
// Yaw constants are the widely documented ones; same-engine families share a value. ----
sgSensIn = ""
sgSensGame = 0
sgSensYaws = "0.022 0.022 0.022 0.0066 0.0066 0.07"
sgSensNames = "CS/Source/TF2 Quake Apex Overwatch CoD Valorant"
sgSensCalc = [ result (*f $sgSensIn (*f (at $sgSensYaws $sgSensGame) (*f 33.0 $sensitivityscale))) ]
sgSensBack = [ result (divf $sensitivity (*f (at $sgSensYaws $arg1) (*f 33.0 $sensitivityscale))) ]
newgui senstranslator [ guistayopen [
    guitext "Convert a sensitivity from another game"
    guilist [ guitext "their sens: " ; guifield sgSensIn 8 [] ]
    guitext (concatword "from:  " (at $sgSensNames $sgSensGame))
    guilist [ guiradio "CS/Source/TF2" sgSensGame 0 ; guiradio "Quake" sgSensGame 1 ; guiradio "Apex" sgSensGame 2 ]
    guilist [ guiradio "Overwatch" sgSensGame 3 ; guiradio "CoD" sgSensGame 4 ; guiradio "Valorant" sgSensGame 5 ]
    if (strcmp $sgSensIn "") [
        guitext "^f4type a sens above to convert"
    ] [
        guitext (concatword "^f2= SwiftGibs sensitivity " (sgSensCalc))
        guibutton (concatword "apply " (sgSensCalc) " now") [ sensitivity (sgSensCalc) ; echo (concatword "^f2sensitivity set to " $sensitivity) ]
    ]
    guibar
    guitext (concatword "Your current sens " $sensitivity " in other games:")
    guitext (concatword "  CS/Source/TF2 " (sgSensBack 0) "   Quake/Apex " (sgSensBack 1))
    guitext (concatword "  Overwatch/CoD " (sgSensBack 3) "   Valorant " (sgSensBack 5))
    guibar
    guibutton "back" [ cleargui 1 ]
] ] "sens translator"

// ============ Audio tab: everything you hear (4 rows) ============
sgAudioTab = [ guistayopen [
    guitext "Pick, preview, and tune volume + pitch"
    guibutton "hit sounds.." [ showgui hitsounds ]
    guibutton "weapon sounds.." [ showgui weaponsounds ]
    guicheckbox "weapon switch / reload clunk" gunreloadsound
] ]

// ============ Cues tab: everything you SEE around the fight (14 rows) ============
// Every control demos itself on change - and the demo draws over the menu (post-gui overlay).
sgCuesTab = [ guistayopen [
    guitext (concatword "Countdown:  " (at "Off Slam Pulse Collapse Off Orbit Crosshair-Pulse Digits Edge-beats" $reloadcount))
    guilist [ guiradio "Off" reloadcount 0 [reloadcountdemo] ; guiradio "Slam" reloadcount 1 [reloadcountdemo] ; guiradio "Pulse" reloadcount 2 [reloadcountdemo] ]
    guilist [ guiradio "Collapse" reloadcount 3 [reloadcountdemo] ; guiradio "Orbit" reloadcount 5 [reloadcountdemo] ; guiradio "Crosshair-Pulse" reloadcount 6 [reloadcountdemo] ]
    guilist [ guiradio "Digits" reloadcount 7 [reloadcountdemo] ; guiradio "Edge-beats" reloadcount 8 [reloadcountdemo] ]
    guitext (concatword "Ready flash:  " (at "Off Pip Dot Thin-ring Ring-ping Bloom Burst Edge-pulse" $reloadflash))
    guilist [ guiradio "Off" reloadflash 0 [reloadcountdemo] ; guiradio "Pip" reloadflash 1 [reloadcountdemo] ; guiradio "Dot" reloadflash 2 [reloadcountdemo] ; guiradio "Thin" reloadflash 3 [reloadcountdemo] ]
    guilist [ guiradio "Ping" reloadflash 4 [reloadcountdemo] ; guiradio "Bloom" reloadflash 5 [reloadcountdemo] ; guiradio "Burst" reloadflash 6 [reloadcountdemo] ; guiradio "Edge" reloadflash 7 [reloadcountdemo] ]
    guilist [ guitext "Metronome: " ; guiradio "Off" reloadmetronome 0 ; guiradio "Flat" reloadmetronome 1 [reloadcountdemo] ; guiradio "Rising" reloadmetronome 2 [reloadcountdemo] ]
    guitext "metronome volume"
    guislider reloadmetrovol 0 255 [reloadcountdemo]
    guilist [ guitext "Hit marker: " ; guiradio "Off" hitmarker 0 ; guiradio "X-flash" hitmarker 1 [hitmarkerdemo] ; guiradio "Ring-out" hitmarker 2 [hitmarkerdemo] ; guiradio "Notch" hitmarker 3 [hitmarkerdemo] ]
    guilist [ guicheckbox "killstreak counter" killstreakhud ; guistrut 1 ; guicheckbox "milestone sound" killstreaksound 1 0 [ if $killstreaksound [ playstreaksound ] ] ]
    guilist [ guitext "Streak fx: " ; guiradio "Off" killstreakfx 0 ; guiradio "Slam" killstreakfx 1 [streakfxdemo] ; guiradio "Minimal" killstreakfx 2 [streakfxdemo] ]
    guibutton "cue colours.." [ showgui cuecolors ]
] ]

// ---- cue colours page: hue shift / mono / opacity for countdown + ready flash.
// Defaults (hue 0, mono off, opacity 100) = the stock look; every control live-demos.
// GOTCHA: guisliders must be STANDALONE rows - inside a horizontal guilist they stick at 0. ----
newgui cuecolors [ guistayopen [
    guitext "countdown hue shift"
    guislider reloadcounthue 0 359 [reloadcountdemo]
    guitext "countdown opacity"
    guislider reloadcountalpha 10 100 [reloadcountdemo]
    guitext "ready flash hue shift"
    guislider reloadflashhue 0 359 [reloadcountdemo]
    guitext "ready flash opacity"
    guislider reloadflashalpha 10 100 [reloadcountdemo]
    guilist [ guicheckbox "countdown mono" reloadcountmono 1 0 [reloadcountdemo] ; guistrut 1 ; guicheckbox "flash mono" reloadflashmono 1 0 [reloadcountdemo] ]
    guibar
    guibutton "back" [ cleargui 1 ]
] ] "cue colours"

// ---- hit sounds page (8 rows; selecting or dragging auditions the sound) ----
newgui hitsounds [ guistayopen [
    guitext (concatword "Hit sound:  " (at "Stock TF2 Quake CoD Custom-1 Custom-2" $hitsoundsel))
    guilist [ guiradio "Stock" hitsoundsel 0 [playhitsoundpreview] ; guiradio "TF2" hitsoundsel 1 [playhitsoundpreview] ; guiradio "Quake" hitsoundsel 2 [playhitsoundpreview] ; guiradio "CoD" hitsoundsel 3 [playhitsoundpreview] ]
    guilist [ guiradio "Custom 1" hitsoundsel 4 [playhitsoundpreview] ; guiradio "Custom 2" hitsoundsel 5 [playhitsoundpreview] ; guibutton "preview" [ playhitsoundpreview ] ]
    guitext "hit sound volume"
    guislider hitsoundvol 0 255 [playhitsoundpreview]
    guitext "hit sound pitch (100 = normal)"
    guislider hitsoundpitch 50 200 [playhitsoundpreview]
    guibar
    guibutton "back" [ cleargui 1 ]
] ] "hit sounds"

// ---- weapon sounds page: local-only fire sound + reload-charge soundscape, each with
// volume + pitch. Pitch 100 = neutral; for the reload charge, pitch also stretches or
// shrinks the 1.5s sweep (metronome stays exact). Sliders STANDALONE (guilist = stuck-at-0). ----
newgui weaponsounds [ guistayopen [
    guitext (concatword "Fire sound:  " (at "Stock Laser Zap Thump" $firesound))
    guilist [ guiradio "Stock" firesound 0 ; guiradio "Laser" firesound 1 [playfirepreview] ; guiradio "Zap" firesound 2 [playfirepreview] ; guiradio "Thump" firesound 3 [playfirepreview] ]
    guitext "fire volume"
    guislider firesoundvol 0 255 [playfirepreview]
    guitext "fire pitch (100 = normal)"
    guislider firesoundpitch 50 200 [playfirepreview]
    guibar
    guitext (concatword "Reload charge:  " (at "Off Laser-charge Rising-hum" $reloadsound))
    guilist [ guiradio "Off" reloadsound 0 ; guiradio "Laser-charge" reloadsound 1 [playreloadpreview] ; guiradio "Rising-hum" reloadsound 2 [playreloadpreview] ]
    guitext "reload charge volume"
    guislider reloadsoundvol 0 255 [playreloadpreview]
    guitext "reload charge pitch (alters length)"
    guislider reloadsoundpitch 50 200 [playreloadpreview]
    guibar
    guibutton "back" [ cleargui 1 ]
] ] "weapon sounds"

// ============ Friends tab: quick add + who's here, bounded (max ~12 rows) ============
// Full list + removal live on the manage page: this tab shows at most 6 in-game rows,
// so a busy 20-player server can't overflow it into numbered tabs.
sgFriendsTab = [ guistayopen [
    guilist [ guitext "Add a friend: " ; guifield sgFriendName 16 [if (strcmp $sgFriendName "") [] [addfriend $sgFriendName; sgFriendName = ""]] ]
    guibar
    guitext "In game now"
    sgShown = 0
    sgOthers = 0
    loop i (numplayers) [
        pn = (getplayername $i)
        if (|| (strcmp $pn "") (strcmp $pn (getname))) [] [
            sgOthers = (+ $sgOthers 1)
            if (< $sgShown 6) [
                sgShown = (+ $sgShown 1)
                guilist [ guitext $pn ; guispring ; if (isfriend $pn) [guitext "^f0(friend)"] [guibutton "^f0+ add" [addfriend $pn]] ]
            ] []
        ]
    ]
    if (> $sgOthers $sgShown) [ guitext (concatword "^f4+" (- $sgOthers $sgShown) " more - see manage friends..") ] []
    if (= $sgOthers 0) [ guitext "^f4No other players in game" ] []
    guibar
    guibutton (concatword "manage friends (" (numfriends) ")..") [ showgui friendmanage ]
] ]

// ---- manage friends page: the full lists. If this ever exceeds ~16 rows it paginates
// into numbered pages WITHIN this popup, which is fine (standard for long lists). ----
newgui friendmanage [ guistayopen [
    guitext (concatword "Your friends (" (numfriends) ")")
    guibar
    if (numfriends) [
        loop i (numfriends) [
            fn = (getfriend $i)
            guilist [ guitext $fn ; guispring ; guibutton "^f3remove" [delfriend $fn] ]
        ]
    ] [ guitext "^f4No friends yet - add one from the Friends tab" ]
    guibar
    guitext "In game now"
    sgAnyOthers = 0
    loop i (numplayers) [
        pn = (getplayername $i)
        if (|| (strcmp $pn "") (strcmp $pn (getname))) [] [
            sgAnyOthers = 1
            guilist [ guitext $pn ; guispring ; if (isfriend $pn) [guitext "^f0(friend)"] [guibutton "^f0+ add" [addfriend $pn]] ]
        ]
    ]
    if $sgAnyOthers [] [ guitext "^f4No other players in game" ]
    guibar
    guibutton "back" [ cleargui 1 ]
] ] "manage friends"

// ---- feedback page (F8 in-game, or via the SwiftGibs tab) ----
// guifield with a NEGATIVE length = wrapped free-text field (engine cap ~260
// chars; the relay allows more but this is the practical in-game limit).
// sendfeedback (patch 14) blocks briefly with a progress bar (esc aborts) and
// reports into $feedbackstatus. It auto-attaches telemetry (map, mode,
// position, fps, platform) plus the match stats passed as the info arg; the
// F8 path (feedbackshot alias in autoexec) also snaps screenshot/
// feedbackshot.jpg first and sets sgFbShot so the send includes it.
newgui feedback [ guistayopen [
    guitext "Found a bug? Got an idea? Tell us"
    guitext "^f4posted publicly at github.com/SalukiSwift/swiftgibs/issues"
    guitext "^f4includes map, score + system info to help us fix it"
    guibar
    guilist [ guitext "Type: " ; guiradio "bug" sgFbCat 0 ; guistrut 1 ; guiradio "idea" sgFbCat 1 ; guistrut 1 ; guiradio "other" sgFbCat 2 ]
    guifield sgFbText -28 []
    guicheckbox "sign with my player name (otherwise anonymous)" sgFbName
    if $sgFbShot [ guicheckbox "attach screenshot (the moment F8 was pressed)" sgFbShot ] []
    guilist [ guibutton "^f0send" [ if (strcmp $sgFbText "") [ feedbackstatus = "type something first" ] [ sendfeedback (if $sgFbName [getname] [result ""]) (at "bug idea other" $sgFbCat) $swiftgibsversion $sgFbText $sgFbShot (concatword "frags " (getfrags) ", deaths " (getdeaths) ", damage " (gettotaldamage) ", shots " (gettotalshots) ", best streak " (getbeststreak)) ] ] ; guistrut 2 ; guibutton "clear" [ sgFbText = "" ; feedbackstatus = "" ] ]
    guitext (concatword "^f2" $feedbackstatus)
    guibar
    guitext "^f4tip: F8 during a game opens this with a screenshot"
    guibutton "back" [ cleargui 1 ]
] ] "send feedback"
