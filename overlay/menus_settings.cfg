// SwiftGibs — settings tab bodies. Attached to Esc->options as tabs by build/integrate-menus.sh
// (which adds `guitab "SwiftGibs"; sgSwiftgibsTab` and `guitab "Friends"; sgFriendsTab` to the
// stock options gui). Colour codes: ^f0 green, ^f3 red, ^f4 grey.
//
// LAYOUT RULE: a tab auto-paginates into an ugly NUMBERED tab when its content exceeds
// ~16 text rows (engine `guiautotab`, 3dgui.cpp). So tabs stay small HUBS; anything bulky
// or dynamic lives on a dedicated sub-page (showgui), where extra height is fine.
// Interactive bodies are wrapped in `guistayopen [ ... ]` so controls adjust in place; "back"
// buttons use `cleargui 1` (pop one level - bare cleargui exits the whole menu stack).
//
// LIVE DEMOS: every cue control carries an onchange action so picking an option previews it
// immediately - `reloadcountdemo` runs a real 3-2-1 with the current countdown style, ready
// flash AND metronome on the HUD (drawn even over the main menu: gl_drawmainmenu calls
// gl_drawhud -> gameplayhud); `playhitsoundpreview` / `playstreaksound` audition the sounds.

sgFriendName = ""

// ============ SwiftGibs tab: everything at a glance (12 rows) ============
sgSwiftgibsTab = [ guistayopen [
    guicheckbox "server browser: instagib servers only"  filterinstaservers
    guibar
    guitext "Scoreboard"
    guilist [ guicheckbox "frags (all modes)" hidefrags 0 1 ; guistrut 1 ; guicheckbox "deaths" showdeaths ; guistrut 1 ; guicheckbox "KDR" showkdr ]
    guilist [ guicheckbox "captures" showcaptures ; guistrut 1 ; guicheckbox "accuracy" showacc ; guistrut 1 ; guicheckbox "damage" showdmg ]
    guilist [ guicheckbox "highlight friends" highlightfriends ; guistrut 1 ; guicheckbox "highlight my name" highlightself ]
    guibar
    guilist [ guibutton "career stats.." [ showgui swiftstats ] ; guistrut 2 ; guibutton "chat history.." [ showgui swiftchat ] ]
    guibar
    guilist [ guibutton "reload cues.." [ showgui reloadcues ] ; guistrut 2 ; guibutton "hit sounds.." [ showgui hitsounds ] ]
    guilist [ guicheckbox "killstreak counter" killstreakhud ; guistrut 1 ; guicheckbox "killstreak milestone sound" killstreaksound 1 0 [ if $killstreaksound [ playstreaksound ] ] ]
    guilist [ guitext "Teammate crosshair: " ; guiradio "Off" teamcrosshair 0 ; guibutton "Colour" [teamcrosshair 1; teamcrosshairstyle 1] ; guibutton "Icon" [teamcrosshair 1; teamcrosshairstyle 0] ]
] ]

// ---- reload cues page (15 rows; every control demos itself on change) ----
newgui reloadcues [ guistayopen [
    guitext (concatword "Countdown:  " (at "Off Rings Pulse Collapse Sweep Pips Crosshair-Pulse Digits Edge-beats" $reloadcount))
    guilist [ guiradio "Off" reloadcount 0 [reloadcountdemo] ; guiradio "Rings" reloadcount 1 [reloadcountdemo] ; guiradio "Pulse" reloadcount 2 [reloadcountdemo] ]
    guilist [ guiradio "Collapse" reloadcount 3 [reloadcountdemo] ; guiradio "Sweep" reloadcount 4 [reloadcountdemo] ; guiradio "Pips" reloadcount 5 [reloadcountdemo] ]
    guilist [ guiradio "Crosshair-Pulse" reloadcount 6 [reloadcountdemo] ; guiradio "Digits" reloadcount 7 [reloadcountdemo] ; guiradio "Edge-beats" reloadcount 8 [reloadcountdemo] ]
    guibar
    guitext (concatword "Ready flash:  " (at "Off Pip Dot Thin-ring Ring-ping Bloom Burst Edge-pulse" $reloadflash))
    guilist [ guiradio "Off" reloadflash 0 [reloadcountdemo] ; guiradio "Pip" reloadflash 1 [reloadcountdemo] ; guiradio "Dot" reloadflash 2 [reloadcountdemo] ; guiradio "Thin" reloadflash 3 [reloadcountdemo] ]
    guilist [ guiradio "Ping" reloadflash 4 [reloadcountdemo] ; guiradio "Bloom" reloadflash 5 [reloadcountdemo] ; guiradio "Burst" reloadflash 6 [reloadcountdemo] ; guiradio "Edge" reloadflash 7 [reloadcountdemo] ]
    guibar
    guilist [ guitext "Reload sound: " ; guiradio "Off" reloadmetronome 0 ; guiradio "Flat" reloadmetronome 1 [reloadcountdemo] ; guiradio "Rising" reloadmetronome 2 [reloadcountdemo] ]
    guitext "reload volume"
    guislider reloadmetrovol 0 255 [reloadcountdemo]
    guicheckbox "rifle reload sound" gunreloadsound
    guibar
    guibutton "back" [ cleargui 1 ]
] ] "reload cues"

// ---- hit sounds page (8 rows; selecting or dragging auditions the sound) ----
newgui hitsounds [ guistayopen [
    guitext (concatword "Hit sound:  " (at "Stock TF2 Quake CoD Custom-1 Custom-2" $hitsoundsel))
    guilist [ guiradio "Stock" hitsoundsel 0 [playhitsoundpreview] ; guiradio "TF2" hitsoundsel 1 [playhitsoundpreview] ; guiradio "Quake" hitsoundsel 2 [playhitsoundpreview] ; guiradio "CoD" hitsoundsel 3 [playhitsoundpreview] ]
    guilist [ guiradio "Custom 1" hitsoundsel 4 [playhitsoundpreview] ; guiradio "Custom 2" hitsoundsel 5 [playhitsoundpreview] ; guibutton "preview" [ playhitsoundpreview ] ]
    guitext "hit sound volume"
    guislider hitsoundvol 0 255 [playhitsoundpreview]
    guibar
    guibutton "back" [ cleargui 1 ]
] ] "hit sounds"

// ============ Friends tab: quick add + who's here, bounded (max ~12 rows) ============
// Full list + removal live on the manage page: this tab shows at most 6 in-game rows,
// so a busy 20-player server can't overflow it into numbered tabs.
sgFriendsTab = [ guistayopen [
    guilist [ guitext "Add a friend: " ; guifield sgFriendName 16 [if (strcmp $sgFriendName "") [] [addfriend $sgFriendName; sgFriendName = ""]] ]
    guibar
    guitext "In game now"
    sgShown = 0
    sgOthers = 0
    loop i (numplayers) [
        pn = (getplayername $i)
        if (|| (strcmp $pn "") (strcmp $pn (getname))) [] [
            sgOthers = (+ $sgOthers 1)
            if (< $sgShown 6) [
                sgShown = (+ $sgShown 1)
                guilist [ guitext $pn ; guispring ; if (isfriend $pn) [guitext "^f0(friend)"] [guibutton "^f0+ add" [addfriend $pn]] ]
            ] []
        ]
    ]
    if (> $sgOthers $sgShown) [ guitext (concatword "^f4+" (- $sgOthers $sgShown) " more - see manage friends..") ] []
    if (= $sgOthers 0) [ guitext "^f4No other players in game" ] []
    guibar
    guibutton (concatword "manage friends (" (numfriends) ")..") [ showgui friendmanage ]
] ]

// ---- manage friends page: the full lists. If this ever exceeds ~16 rows it paginates
// into numbered pages WITHIN this popup, which is fine (standard for long lists). ----
newgui friendmanage [ guistayopen [
    guitext (concatword "Your friends (" (numfriends) ")")
    guibar
    if (numfriends) [
        loop i (numfriends) [
            fn = (getfriend $i)
            guilist [ guitext $fn ; guispring ; guibutton "^f3remove" [delfriend $fn] ]
        ]
    ] [ guitext "^f4No friends yet - add one from the Friends tab" ]
    guibar
    guitext "In game now"
    sgAnyOthers = 0
    loop i (numplayers) [
        pn = (getplayername $i)
        if (|| (strcmp $pn "") (strcmp $pn (getname))) [] [
            sgAnyOthers = 1
            guilist [ guitext $pn ; guispring ; if (isfriend $pn) [guitext "^f0(friend)"] [guibutton "^f0+ add" [addfriend $pn]] ]
        ]
    ]
    if $sgAnyOthers [] [ guitext "^f4No other players in game" ]
    guibar
    guibutton "back" [ cleargui 1 ]
] ] "manage friends"
