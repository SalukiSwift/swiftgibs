// SwiftGibs - map-vote panel (client-side tally, one-click voting).
// Works on two server dialects (engine patch 15 auto-detects):
//   MAPBATTLE (RUGBY-family): candidates + live counts parsed from the server's
//     "[MAPBATTLE]" broadcasts; clicking votes by saying the number in chat.
//   Stock servers: tally rebuilt from "X suggests <mode> on map <map>" broadcasts;
//     clicking sends the stock vote.
// The panel auto-opens when a vote starts (mapvotepopup, toggle below) or on V.
// Candidate rows are capped so a busy server can't overflow the panel (guis don't scroll).

mapvoterows = 8

newgui "mapvote" [ guistayopen [
    if (strcmp (getvotewinner) "") [
        guitext "^f2Vote for the next map"
    ] [
        guitext (concatword "^f2Winner:  ^f0" (getvotewinner))
    ]
    guibar
    loop i (min (numvotemaps) $mapvoterows) [
        vm = (getvotemap $i)
        vn = (getvotenum $i)
        guilist [
            guiimage (concatword "packages/base/" $vm ".jpg") [castmapvote $i] 2 1 "data/cube.png" $vm
            guilist [
                guitext (concatword $vm (? (strcmp $vm (getvotemymap)) "   ^f8(your vote)" ""))
                guitext (concatword "^f2" (getvotecount $i) " votes")
                guibutton (concatword "vote" (? (< $vn 0) "" (concatword " (say " $vn ")"))) [castmapvote $i]
            ]
        ]
        guibar
    ]
    if (numvotemaps) [] [ guitext "^f4no vote running - candidates appear when one starts" ]
    if (> (numvotemaps) $mapvoterows) [ guitext (concatword "^f4...and " (- (numvotemaps) $mapvoterows) " more") ] []
    guicheckbox "auto-open when a vote starts" mapvotepopup
] ]
