// SwiftGibs - intermission map-vote panel (client-side tally, one-click voting)
// Vote counts are reconstructed from the server's "X suggests <mode> on map <map>" broadcasts
// (client-only, best-effort). Click a mapshot or its "vote" button to cast/re-cast your vote.
// Candidates are sorted by vote count (desc); we show the top ones (guis don't scroll).

mapvoterows = 8   // cap visible candidate rows so a busy server can't overflow the panel off-screen (guis don't scroll)

newgui "mapvote" [
    guitext "^f2Vote next map"
    guibar
    loop i (min (numvotemaps) $mapvoterows) [
        vm = (getvotemap $i)
        guilist [
            guiimage (concatword "packages/base/" $vm ".jpg") [castmapvote $i] 2 1 "data/cube.png" $vm
            guilist [
                guitext (concatword (? (! $i) "^f0> " "") $vm)
                guitext (concatword "^f5" (getvotemode $i) "   ^f2" (getvotecount $i) " votes")
                guilist [
                    guibutton "vote" [castmapvote $i]
                    if (strcmp $vm (getvotemymap)) [guitext "^f8 (your vote)"] []
                ]
            ]
        ]
        guibar
    ]
    if (numvotemaps) [] [ guitext "^f5no votes yet - pick a map to start the vote" ]
    if (> (numvotemaps) $mapvoterows) [ guitext (concatword "^f5...and " (- (numvotemaps) $mapvoterows) " more (vote via console)") ] []
    guicheckbox "auto-open at intermission" mapvotepopup
]

// fps.cpp calls execident("intermission") at game end; mapvotepopup (VARP, default on) gates the pop-up.
// Defined here (exec'd from autoexec after stock data) so it wins; stock data defines no such alias.
intermission = [ if $mapvotepopup [ showgui "mapvote" ] ]
