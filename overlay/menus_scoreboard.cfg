// SwiftGibs — scoreboard column toggles
newgui "sb_options" [
    guitext "Scoreboard columns"
    guibar
    guicheckbox "show frags in every mode (incl. CTF)"  "hidefrags" 0 1
    guicheckbox "deaths"      "showdeaths"
    guicheckbox "KDR"         "showkdr"
    guicheckbox "accuracy"    "showacc"
    guicheckbox "damage"      "showdmg"
    guicheckbox "captures (CTF)" "showcaptures"
    guibar
    guitext "Highlighting"
    guicheckbox "highlight friends (green)" "highlightfriends"
    guicheckbox "highlight my name (cyan)"  "highlightself"
]
