// SwiftGibs — Career Stats (reads the st_* aliases persisted by autoexec.cfg's
// intermission accumulator + writestats, see Task 6). Guarded reset requires a
// confirm tap on a separate page before zeroing anything.
newgui swiftstats [
    guitext "Career Stats"
    guibar
    guitext (concatword "Matches: "     $st_matches)
    guitext (concatword "Frags: "       $st_frags)
    guitext (concatword "Deaths: "      $st_deaths)
    guitext (concatword "K/D: "         (divf $st_frags (max $st_deaths 1)))
    guitext (concatword "Accuracy: "    (div (* $st_damage 100) (max $st_shots 1)) "%")
    guitext (concatword "Best streak (all-time): " $st_beststreak)
    guitext (concatword "Best streak (this session): " (getbeststreak))
    guibar
    guibutton "streak leaderboard.."     [showgui swiftstreaks]
    guibutton "reset stats.."            [showgui swiftstatsreset]
]
// Top-5 all-time killstreaks with the map and date each was set. st_topstreaks is a
// flat list of "streak map date" triples kept sorted desc by autoexec's addstreakentry.
newgui swiftstreaks [
    guitext "Top 5 Killstreaks"
    guibar
    loop i (div (listlen $st_topstreaks) 3) [
        guitext (concatword "  " (+ $i 1) ".  " (at $st_topstreaks (* $i 3)) " kills    on " (at $st_topstreaks (+ (* $i 3) 1)) "    (" (at $st_topstreaks (+ (* $i 3) 2)) ")")
    ]
    if (= (listlen $st_topstreaks) 0) [ guitext "^f4no streaks recorded yet - play a match!" ]
    guibar
    guibutton "back"                     [ cleargui 1 ]
]
newgui swiftstatsreset [
    guitext "Reset all career stats?"
    guibar
    guibutton "yes, reset stats"        [ alias st_matches 0; alias st_frags 0; alias st_deaths 0; alias st_damage 0; alias st_shots 0; alias st_beststreak 0; alias st_topstreaks ""; writestats; cleargui ]
    guibutton "cancel"                  [ cleargui ]
]
