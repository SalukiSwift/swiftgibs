// SwiftGibs — Career Stats (reads the st_* aliases persisted by autoexec.cfg's
// intermission accumulator + writestats, see Task 6). Guarded reset requires a
// confirm tap on a separate page before zeroing anything.
newgui swiftstats [
    guitext "Career Stats"
    guibar
    guitext (concatword "Matches: "     $st_matches)
    guitext (concatword "Frags: "       $st_frags)
    guitext (concatword "Deaths: "      $st_deaths)
    guitext (concatword "K/D: "         (divf $st_frags (max $st_deaths 1)))
    guitext (concatword "Accuracy: "    (div (* $st_damage 100) (max $st_shots 1)) "%")
    guitext (concatword "Best streak: " $st_beststreak)
    guibar
    guibutton "reset stats.."           [showgui swiftstatsreset]
]
newgui swiftstatsreset [
    guitext "Reset all career stats?"
    guibar
    guibutton "yes, reset stats"        [ alias st_matches 0; alias st_frags 0; alias st_deaths 0; alias st_damage 0; alias st_shots 0; alias st_beststreak 0; writestats; cleargui ]
    guibutton "cancel"                  [ cleargui ]
]
