// SwiftGibs — server-browser gui reproduction (Task 10: "show non-instagib servers" checkbox).
//
// The stock server-browser gui is `newgui servers [ ... ] "" [initservers]`, defined in the
// official data/menus.cfg (fetched fresh at build time by build/fetch-official-data.sh from a
// pinned upstream release URL, so this exact text is not a moving target). It is small and
// self-contained (one settings row + one call into the engine-builtin `guiservers`, which owns
// the actual list/columns/sort/connect logic) — unlike the much larger stock "options" gui,
// which SwiftGibs extends via a build-time byte-splice (build/integrate-menus.sh) specifically
// because it is too large/fragile to safely reproduce verbatim.
//
// CubeScript's `newgui` simply (re)registers a gui body under a name; whichever definition runs
// LAST wins. The engine execs data/menus.cfg during init (main.cpp) and only execs autoexec.cfg
// afterwards, so redefining `newgui servers` here — reached via `exec menus_serverbrowser.cfg`
// from autoexec.cfg — overwrites the stock definition with this one.
//
// Everything below is byte-for-byte identical to the stock block (confirmed against the actual
// fetched-and-packaged data/menus.cfg) EXCEPT the two lines marked "SwiftGibs addition", which
// add one more checkbox to the existing settings row, next to "search LAN" / "auto-update" /
// "auto-sort". It does not touch `guiservers` (the list/sort/connect engine builtin) at all.
newgui servers [
    guistayopen [
        guiservers [
            guilist [
                guibutton "update from master server" "updatefrommaster"
                guibar
                guicheckbox "search LAN" searchlan
                guibar
                guicheckbox "auto-update" autoupdateservers
                guibar
                guicheckbox "auto-sort" autosortservers
                if (= $autosortservers 0) [
                    guibar
                    guibutton "sort" "sortservers"
                ]
                guibar                                                                          // SwiftGibs addition
                guicheckbox "show all game modes (not just instagib)" filterinstaservers 0 1     // SwiftGibs addition
            ]
            guibar
        ] 17
    ]
] "" [initservers]
