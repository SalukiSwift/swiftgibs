// SwiftGibs — friend list manager
FriendName = ""
newgui "friends" [
    guitext "Friends — highlighted green in-game"
    guibar
    guitext "add by name:"
    guifield FriendName 20 [if (strcmp $FriendName "") [] [addfriend $FriendName; FriendName = ""]]
    guibar
    guitext "your friends:"
    guilist [
        loop i (numfriends) [
            guilist [
                guibutton (concatword "^f3X ") [delfriend (getfriend $i)] -1
                guitext (getfriend $i)
            ]
        ]
    ]
    guibar
    guitext "in game now:"
    guilist [
        loop i (numplayers) [
            FName = (getplayername $i)
            if (strcmp $FName "") [] [
                guilist [
                    if (isfriend $FName) [guitext "^f0(friend) "] [guibutton "^f0+ " [addfriend $FName] -1]
                    guitext $FName
                ]
            ]
        ]
    ]
]

// Override the stock main menu — verbatim reproduction of dist/swiftgibs-win64/data/menus.cfg
// lines 21-60, with one addition: guibutton "friends" after "server browser..".
// Exec'd after data/menus.cfg so this definition wins.
newgui main [
    guilist [
        guiimage (concatword "packages/icons/" (playermodelicon) ".jpg") [chooseplayermodel] 1.15
        guistrut 0.25
        guilist [
            newname = (getname)
            guifield newname 15 [name $newname]
            guispring
            guilist [
                guibutton (playermodelname) [chooseplayermodel] 0
                guistrut 1
                guiimage (getcrosshair) [showgui crosshair] 0.5
            ]
        ]
    ]
    guibar
    guibutton "server browser.."  "showgui servers"
    guibutton "friends" [showgui "friends"]
    if (isconnected) [
        guibar
        if (|| $editing (m_edit (getmode))) [
            guibutton "editing.." "showgui editing"
        ]
        guibutton "vote game mode / map.." "showgui gamemode"
        // guibutton "lanconnect"
        // guibutton "connect localhost"
        guibutton "switch team" [if (strcmp (getteam) "good") [team evil] [team good]]
        guibutton "toggle spectator" [spectator (! (isspectator (getclientnum)))] "spectator"
        guibutton "master.." [showgui master]
        guibar
        guibutton "options.."  "showgui options"
        guibutton "disconnect" "disconnect"         "exit"
    ] [
        guibutton "bot match.."      "showgui botmatch"
        guibutton "campaign.."       "showgui campaign"
        guibar
        guibutton "options.."        "showgui options"
        guibutton "about.."          "showgui about"
        guibutton "quit"             "quit"                 "exit"
    ]
] 0
