// Competitive Sauerbraten config
// Based on community standard settings (kb.p1x.pw/pro-settings)

// === CROSSHAIR ===
crosshairsize 15             // default size
crosshairfx 1                // color feedback (grey=reloading, red=low HP)

// === VISIBILITY ===
fullbrightmodels 200         // player models glow bright
forceplayermodels 1          // everyone uses your chosen model
texreduce 12                 // maximum texture blur (was 6)
maxtexsize 128               // cap texture resolution

// === CAMERA / VIEW ===
fov 120                      // wider FOV (default 100)
maxroll 0                    // no camera roll on strafe
hudgun 0                     // hide weapon model (clear view, learn timings)
hudgunsway 0                 // no weapon sway
muzzleflash 0                // no flash animation
muzzlelight 0                // no flash lighting
zoominvel 0                  // instant zoom
zoomoutvel 0                 // instant unzoom

// === PERFORMANCE ===
maxfps 495                   // 3x 165Hz refresh for smooth frame pacing
blood 0                      // no blood
grass 0                      // no grass
shaderdetail 0               // simpler shaders
vsync 0                      // disable vsync

// === CORPSES ===
hidedead 1                   // dead bodies invisible entirely
ragdoll 0                    // disable ragdoll physics (redundant but safe)
ragdollmillis 0              // no ragdoll animation
ragdollfade 0                // no fade

// === FRIENDLY INDICATOR ===
teamcrosshair 1              // marker over crosshair when aiming at teammate

// === COMBAT FEEDBACK ===
hitsound 1                   // audio ding when you land a hit
hitcrosshair 1000            // hit marker shows for full 1 second (max)
// explicit re-load overrides any stale loadcrosshair in config.cfg
loadcrosshair data/crosshair.png 0
loadcrosshair data/hit.png 2

// === DISPLAY ===
scr_w 2560                   // force 1440p
scr_h 1440
fullscreen 1
gamma 110                    // slightly brighter screen

// === BINDS ===
bind MOUSE1 attack           // reset in case config.cfg cached a stale version
bind MOUSE2 togglezoom
