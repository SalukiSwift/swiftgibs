// SwiftGibs — Chat History (session-only; not persisted to disk). Reads the
// client-side log built by fpsgame/client.cpp's logchat()/numchatlines/
// getchatline (patch 12, Task 9): every local "say"/"sayteam" and every
// received N_TEXT/N_SAYTEAM line, capped at 200 entries in the engine.
// Guis can't scroll far, so this page only ever renders the most recent
// SGCHATCAP lines, newest first (reverse index), so the newest message is
// always the first line shown even when the log is longer than the panel.
sgChatCap = 15

newgui swiftchat [
    guititle "Chat History (this session)"
    guibar
    if (= (numchatlines) 0) [
        guitext "^f4No messages yet."
    ] [
        sgChatShown = (min (numchatlines) $sgChatCap)
        if (> (numchatlines) $sgChatCap) [
            guitext (concatword "^f4(showing most recent " $sgChatCap " of " (numchatlines) ")")
            guibar
        ]
        loop i $sgChatShown [
            sgChatIdx = (- (- (numchatlines) 1) $i)
            guitext (getchatline $sgChatIdx)
        ]
    ]
]
