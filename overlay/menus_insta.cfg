// SwiftGibs — F3 Quick Play (actions only; all settings live in Esc->options tabs)
newgui swiftgibs [
    guitext "Quick Play — vs bots"
    guibar
    guibutton "Instagib FFA  - ot"            "loop i 4 [addbot]; mode 3; map ot"
    guibutton "Instagib FFA  - complex"       "loop i 4 [addbot]; mode 3; map complex"
    guibutton "Instagib FFA  - curvy_castle"  "loop i 4 [addbot]; mode 3; map curvy_castle"
    guibutton "Insta Team    - forge"         "loop i 4 [addbot]; mode 4; map forge"
    guibutton "Insta CTF     - face-capture"  "loop i 6 [addbot]; mode 12; map face-capture"
    guibutton "add 2 bots"                    "addbot; addbot"
    guibar
    guibutton "SwiftGibs settings.."          [showgui options]
]
quickplay = [ showgui swiftgibs ]
if (strcmp (getbind F3) "") [ bind F3 [ quickplay ] ] []
