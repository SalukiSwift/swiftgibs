// SwiftGibs quick menu — instagib only. Shown with F3 (bind below).
newgui swiftgibs [
    guitext "SwiftGibs — Instagib"
    guibar
    guibutton "Connect: my server"           "connect 0.0.0.0 37010"
    guibar
    guitext "Local match vs bots:"
    guibutton "Instagib FFA  - ot"            "loop i 4 [addbot]; mode 3; map ot"
    guibutton "Instagib FFA  - complex"       "loop i 4 [addbot]; mode 3; map complex"
    guibutton "Instagib FFA  - curvy_castle"  "loop i 4 [addbot]; mode 3; map curvy_castle"
    guibutton "Insta Team    - forge"         "loop i 4 [addbot]; mode 4; map forge"
    guibutton "Insta CTF     - face-capture"  "loop i 6 [addbot]; mode 12; map face-capture"
    guibar
    guibutton "Add 2 more bots"               "addbot; addbot"
    guibar
    guicheckbox "server browser: insta servers only"  "filterinstaservers"
    guicheckbox "scoreboard: show accuracy"            "showacc"
    guicheckbox "scoreboard: show damage"              "showdmg"
]
bind F3 [showgui swiftgibs]
