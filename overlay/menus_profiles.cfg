// SwiftGibs — Preferences Profiles (Task 3). Save/load/delete named snapshots of the
// full SwiftGibs settings surface (sgProfileVars, overlay/autoexec.cfg). Files live at
// profiles/<name>.cfg under the game home dir, written by the saveprofile ICOMMAND
// (patches/16-profiles.patch); loading is a plain `exec`, no engine support needed.
//
// GOTCHA: guibutton actions built inside a loop must bake the loop var into a SINGLE
// baked command via concatword (never reference $loopvar inside a `[...]` block - it
// reads whatever the var holds when the button is finally clicked, i.e. the LAST
// iteration's value, not the row's own value). sgLoadProfile/sgDeleteProfile below take
// the name as $arg1 so each row only ever bakes one command + one argument.
sgLoadProfile = [ exec (concatword "profiles/" $arg1 ".cfg") ; echo (concatword "^f2profile " $arg1 " loaded") ]
sgDeleteProfile = [ delprofile $arg1 ]

sgNewProfName = ""

newgui profiles [ guistayopen [
    guititle "Preferences Profiles"
    guibar
    guitext "^f4Save your current SwiftGibs settings under a name, then load or delete it later."
    guilist [ guitext "New profile: " ; guifield sgNewProfName 16 [ if (strcmp $sgNewProfName "") [] [ saveprofile $sgNewProfName ; sgNewProfName = "" ] ] ]
    guibutton "save current settings.." [ if (strcmp $sgNewProfName "") [] [ saveprofile $sgNewProfName ; sgNewProfName = "" ] ]
    guibar
    guitext "^f2Saved profiles"
    sgProfCount = 0
    loopfiles sgPf profiles cfg [
        sgProfCount = (+ $sgProfCount 1)
        guilist [
            guitext $sgPf
            guispring
            guibutton "load"        (concatword "sgLoadProfile " $sgPf)
            guistrut 1
            guibutton "^f3delete"   (concatword "sgDeleteProfile " $sgPf)
        ]
    ]
    if (= $sgProfCount 0) [ guitext "^f4No profiles saved yet" ] []
    guibar
    guibutton "back" [ cleargui 1 ]
] ] "profiles"
