// SwiftGibs — HUD options (reload countdown style + reload sound)
newgui "hud" [
    guitext "HUD Options"
    guibar
    guitext "Reload countdown style"
    guitext (concatword "Current: " (at "Off Rings Pulse Collapse Sweep Pips Crosshair-Pulse Digits" $reloadcount))
    guibar
    guibutton "Off"             [reloadcount 0]
    guibutton "Rings"           [reloadcount 1]
    guibutton "Pulse"           [reloadcount 2]
    guibutton "Collapse"        [reloadcount 3]
    guibutton "Sweep"           [reloadcount 4]
    guibutton "Pips"            [reloadcount 5]
    guibutton "Crosshair Pulse" [reloadcount 6]
    guibutton "Digits"          [reloadcount 7]
    guibar
    guibutton "reload sound (metronome)..." [showgui "reloadsound"]
    guibutton "preview (close & play)"      [cleargui; reloadcountdemo]
]

// Reload metronome sound: tick·tick·tick·ding, Off / Flat / Rising
newgui "reloadsound" [
    guitext "Reload sound (metronome)"
    guitext "tick - tick - tick - ding! (ding = ready to fire)"
    guitext (concatword "Current: " (at "Off Flat Rising" $reloadmetronome))
    guibar
    guibutton "Off"    [reloadmetronome 0]
    guibutton "Flat"   [reloadmetronome 1]
    guibutton "Rising" [reloadmetronome 2]
    guibar
    guibutton "preview (close & play)" [cleargui; reloadcountdemo]
]
