// SwiftGibs — HUD options (reload countdown style selector)
newgui "hud" [
    guitext "HUD Options"
    guibar
    guitext "Reload countdown style"
    guitext (concatword "Current: " (at "Off Rings Pulse Collapse Sweep Pips Crosshair-Pulse Digits" $reloadcount))
    guibar
    guibutton "Off"             [reloadcount 0]
    guibutton "Rings"           [reloadcount 1]
    guibutton "Pulse"           [reloadcount 2]
    guibutton "Collapse"        [reloadcount 3]
    guibutton "Sweep"           [reloadcount 4]
    guibutton "Pips"            [reloadcount 5]
    guibutton "Crosshair Pulse" [reloadcount 6]
    guibutton "Digits"          [reloadcount 7]
    guibar
    guibutton "preview (close & play)" [cleargui; reloadcountdemo]
]
