// SwiftGibs — HUD options (reload countdown style selector)
newgui "hud" [
    guitext "HUD Options"
    guibar
    guitext "Reload countdown style"
    guitext (concatword "Current: " (at "Off Drift Slam Zoom Tick" $reloadcount))
    guibar
    guibutton "Off"   [reloadcount 0]
    guibutton "Drift" [reloadcount 1]
    guibutton "Slam"  [reloadcount 2]
    guibutton "Zoom"  [reloadcount 3]
    guibutton "Tick"  [reloadcount 4]
    guibar
    guibutton "preview (close & play)" [cleargui; reloadcountdemo]
]
