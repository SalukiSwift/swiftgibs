// SwiftGibs — player render style: flat colour model (default) or exact-hitbox octagon.
// Both are flat team colours: teammate blue, friend cyan, enemy red, friend-on-enemy orange.
newgui "playerstyle" [
    guitext "Player render style"
    guitext (concatword "Current: " (? $playerstyle "Hitbox octagon" "Flat colour model"))
    guibar
    guibutton "Flat colour model  (the character, solid team colour)" [playerstyle 0]
    guibutton "Hitbox octagon     (exact hit shape + facing prong)"    [playerstyle 1]
    guibar
    guitext "Colours: ^f1teammate blue^f7  ^f0friend cyan^f7  ^f3enemy red^f7  friend-on-enemy orange"
    guitext "Toggle any time with the P key."
]
