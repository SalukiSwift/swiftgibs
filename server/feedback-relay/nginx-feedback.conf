# SwiftGibs in-game feedback relay - deliberately PLAINTEXT on a dedicated
# port: the game engine cannot speak TLS, and nothing secret crosses this hop
# (the GitHub token stays on the box, held by the Flask app).
# Install as /etc/nginx/sites-available/swiftgibs-feedback + symlink into
# sites-enabled. Pair with: ufw allow 8300/tcp
server {
    listen 8300;
    listen [::]:8300;

    client_max_body_size 10m;   # room for the optional JPEG screenshot

    location = /feedback {
        proxy_pass http://127.0.0.1:8301;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /version {
        proxy_pass http://127.0.0.1:8301;
    }

    location / { return 404; }
}
